name: Phao Hoa TV Standalone v4.4.19

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: phaohoa-live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: 2. Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install Playwright
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 4. Offline audit
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile main.py sources/phaohoa.py sources/hybrid_support.py
          python -m unittest discover -s tests -v

      - name: 5. Scan Phao Hoa TV
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          PHAOHOA_HOME_URLS: "https://phaohoa1.live/"
          PHAOHOA_MATCH_CONCURRENCY: "3"
          PHAOHOA_HOME_WAIT_MS: "6000"
          PHAOHOA_ROOM_WAIT_SECONDS: "20"
          PHAOHOA_SCAN_PAST_MINUTES: "150"
          PHAOHOA_SCAN_FUTURE_MINUTES: "240"
          PHAOHOA_HYBRID_HTTP_FIRST: "1"
          PHAOHOA_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          PHAOHOA_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          PHAOHOA_DELTA_SCAN_ENABLED: "1"
          PHAOHOA_DELTA_NEAR_MINUTES: "45"
          PHAOHOA_STATE_PATH: "phaohoa_state.json"
          PHAOHOA_SCAN_UNKNOWN_LIVE: "1"
          PHAOHOA_FULL_SCAN: "1"
          PHAOHOA_VERIFY_STREAMS: "1"
          PHAOHOA_VERIFY_TIMEOUT_SECONDS: "7"
          PHAOHOA_MAX_VERIFY_CANDIDATES: "5"
          PHAOHOA_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          PHAOHOA_UPCOMING_KEEP_HOURS: "4"
          PHAOHOA_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          PHAOHOA_UPCOMING_FAR_WAIT_SECONDS: "7"
          PHAOHOA_UPCOMING_NEAR_WAIT_SECONDS: "12"
          PHAOHOA_KEEP_PREVIOUS_UNVERIFIED: "0"
          PHAOHOA_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"
          PHAOHOA_LIST_ALL_DISCOVERED_MATCHES: "1"
          PHAOHOA_PLACEHOLDER_STREAM_BASE: "http://127.0.0.1:9/__phaohoa_metadata__"
        run: |
          set -o pipefail
          python -u main.py 2>&1 | tee phaohoa_scan.log
          raw_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/phaohoa_live.m3u"
          printf '%s\n' "$raw_url" > PHAOHOA_SUBSCRIPTION_URL.txt
          echo "::notice title=URL IPTV Pháo Hoa::${raw_url}"
          echo "KHÔNG dùng URL github.com/.../blob/... vì đó là HTML GitHub." >> PHAOHOA_SUBSCRIPTION_URL.txt

      - name: 6. Audit outputs
        shell: bash
        run: |
          set -euo pipefail
          for file in phaohoa_live.m3u phaohoa_live_pipe.m3u phaohoa_live_vlc.m3u phaohoa_debug.json; do
            test -f "$file"
          done
          if grep -E '^https?://.*\|User-Agent=' phaohoa_live.m3u; then
            echo "::error::Playlist phổ thông không được nối pipe header vào URL"
            exit 1
          fi
          if grep -F 'CHỜ PHÁT' phaohoa_live.m3u; then
            echo "::error::Playlist không được còn nhãn CHỜ PHÁT"
            exit 1
          fi
          if grep -E '^https?://phaohoa1\.live/(truc-tiep|live|room)/' phaohoa_live.m3u; then
            echo "::error::Không được dùng URL trang HTML trận làm dòng phát trong M3U"
            exit 1
          fi
          if grep -E 'github\.com/.+/blob/' phaohoa_live.m3u; then
            echo "::error::Playlist chứa URL GitHub blob HTML"
            exit 1
          fi
          python - <<'PY_AUDIT'
          import json
          import re
          from pathlib import Path

          payload = json.loads(Path('phaohoa_debug.json').read_text(encoding='utf-8'))
          rows = payload if isinstance(payload, list) else payload.get('results', [])
          streams = sum(len(row.get('streams') or []) for row in rows)
          playlist = Path('phaohoa_live.m3u').read_text(encoding='utf-8')
          lines = playlist.splitlines()
          if not lines or lines[0].strip() != '#EXTM3U':
              raise SystemExit('Playlist không bắt đầu đúng bằng #EXTM3U')
          if any('<html' in line.lower() or '<!doctype' in line.lower() for line in lines):
              raise SystemExit('Playlist bị ghi thành HTML')
          extinf_lines = [line for line in lines if line.startswith('#EXTINF:')]
          url_lines = [line for line in lines if line and not line.startswith('#')]
          entries = len(extinf_lines)
          metadata_only = sum('/__phaohoa_metadata__/' in line for line in url_lines)
          match_page_urls = [line for line in url_lines if re.search(r'phaohoa1\.live/(?:truc-tiep|live|room)/', line)]
          generic_names = [line for line in extinf_lines if ',Luồng phát' in line or 'tvg-name="Luồng phát"' in line]
          missing_name = [row.get('url', '') for row in rows if not row.get('match_name')]
          missing_schedule = [row.get('url', '') for row in rows if not (row.get('time') and row.get('date'))]
          missing_blv = [row.get('url', '') for row in rows if not row.get('blv')]
          missing_home_logo = [row.get('url', '') for row in rows if not row.get('home_logo')]
          missing_away_logo = [row.get('url', '') for row in rows if not row.get('away_logo')]
          if entries != len(url_lines):
              raise SystemExit(f'M3U sai cấu trúc: EXTINF={entries}, URL={len(url_lines)}')
          expected_entries = sum(max(1, len(row.get('streams') or [])) for row in rows)
          if entries != expected_entries:
              raise SystemExit(
                  f'Playlist thiếu/thừa mục: expected={expected_entries}, EXTINF={entries}, rows={len(rows)}'
              )
          if match_page_urls:
              raise SystemExit(f'Có {len(match_page_urls)} URL trang HTML làm dòng phát')
          if generic_names:
              raise SystemExit(f'Có {len(generic_names)} kênh bị tên chung Luồng phát')
          if missing_name:
              raise SystemExit(f'Metadata thiếu tên trận: {len(missing_name)}')
          for label, values in (
              ('ngày+giờ', missing_schedule), ('BLV', missing_blv),
              ('logo chủ', missing_home_logo), ('logo khách', missing_away_logo),
          ):
              if values:
                  print(f'::warning::Pháo Hoa TV còn thiếu {label}: {len(values)}/{len(rows)}')
          print(
              f'Pháo Hoa TV: rows={len(rows)} | playlist_entries={entries} | '
              f'url_lines={len(url_lines)} | streams={streams} | safe_metadata={metadata_only}'
          )
          PY_AUDIT

      - name: 7. Upload debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phaohoa-debug-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            phaohoa_scan.log
            phaohoa_debug.json
            phaohoa_home_debug.html
            phaohoa_home_debug.png
            phaohoa_live.m3u
            phaohoa_live_pipe.m3u
            phaohoa_live_vlc.m3u
            phaohoa_state.json
            PHAOHOA_SUBSCRIPTION_URL.txt

      - name: 8. Commit playlists
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(phaohoa_live.m3u phaohoa_live_pipe.m3u phaohoa_live_vlc.m3u phaohoa_debug.json PHAOHOA_SUBSCRIPTION_URL.txt)
          [[ -f phaohoa_state.json ]] && files+=(phaohoa_state.json)
          git add -- "${files[@]}"
          if git diff --cached --quiet; then
            echo "Không có thay đổi."
            exit 0
          fi
          git commit -m "Update Phao Hoa TV playlist"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
